services:
  gemini:
    image: us-docker.pkg.dev/gemini-code-dev/gemini-cli/sandbox@sha256:8c7c10efd6fa25026767f75e27682beb831bd4270d8a04b88234c868973d41f3
    container_name: gemini-cli
    stdin_open: true
    tty: true
    volumes:
      # Mounts your current project folder to /app inside the container
      - .:/app
      # Maps the local ./persist folder to the container's config directory
      - ./persist:/root/.gemini
    env_file: .env
    working_dir: /app

  testbox:
    image: ubuntu:latest
    container_name: testbox
    volumes:
      - ./persist/workspace:/workspace
    stdin_open: true
    tty: true
    working_dir: /workspace
    networks:
      - ai-network


  # TODO
  # Add cursor service, with `build` subsection

networks:
  ai-network:
    driver: bridge
