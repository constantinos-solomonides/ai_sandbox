services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    networks: [sandbox]
    volumes:
      - ./persist/ollama:/root/.ollama
    ports:
      - "11434:11434" # optional; remove if you only want internal access

  ubuntu:
    image: ubuntu:latest
    container_name: ubuntu
    entrypoint: ["/bin/bash"]
    command: ["-c", "sleep infinity"]
    networks: [sandbox]


networks:
  sandbox:
    driver: bridge
    name: ai-sandbox
